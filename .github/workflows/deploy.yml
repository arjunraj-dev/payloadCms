# This workflow builds a Docker image, pushes it to Amazon ECR, then deploys it
# to an EC2 instance by SSHing in, pulling the new image, and restarting the
# container. It runs on every push to the "main" branch.
#
# To use this workflow, you will need to complete the following set-up steps:
#
# 1. Create an ECR repository to store your images (one-time setup):
#      aws ecr create-repository --repository-name payloadcms --region us-east-1
#
# 2. On the EC2 instance:
#    - Install Docker and the AWS CLI.
#    - Attach an IAM instance role (or configure `aws configure`) that grants
#      `ecr:GetAuthorizationToken`, `ecr:BatchGetImage`, and
#      `ecr:GetDownloadUrlForLayer` so the instance can pull from ECR.
#    - Place the app's `.env` file at the path set in `ENV_FILE_PATH` below.
#    - Open the security group for the port set in `HOST_PORT` below.
#
# 3. Add these GitHub Actions secrets (Settings -> Secrets and variables -> Actions):
#    - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
#        IAM user credentials used by the runner to push images to ECR.
#    - EC2_HOST        - public IP or DNS name of the EC2 instance
#    - EC2_SSH_USER    - SSH login user (e.g. ubuntu, ec2-user)
#    - EC2_SSH_KEY     - private key (PEM contents) matching the instance's key pair

name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                            # AWS region the ECR repo lives in
  ECR_REPOSITORY: payloadcms                        # ECR repository name
  CONTAINER_NAME: payloadcms                        # name given to the running container on EC2
  HOST_PORT: 3000                                   # host port mapped to the container's port 3000
  ENV_FILE_PATH: /home/ubuntu/payloadcms/.env       # path to the .env file already on the EC2 instance

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy new image over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE
          script: |
            set -e

            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$(echo "$IMAGE" | cut -d'/' -f1)"

            docker pull "$IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.HOST_PORT }}:3000 \
              --env-file ${{ env.ENV_FILE_PATH }} \
              "$IMAGE"

            docker image prune -f
